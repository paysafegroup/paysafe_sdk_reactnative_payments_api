buildscript {
  ext {
    buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
    minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
    compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '35')
    targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
    kotlinVersion = findProperty('android.kotlinVersion') ?: '2.0.21'
    ndkVersion = "26.1.10909125"
  }
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    maven {
      url new File(
        ["node", "--print", "require.resolve('expo/package.json')"].execute(null, rootDir).text.trim(),
        "../android/maven"
      )
    }
  }
  dependencies {
    classpath("com.android.tools.build:gradle:7.4.2")
    classpath("com.facebook.react:react-native-gradle-plugin:0.71.0")
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    classpath("org.jetbrains.kotlin:compose-compiler-gradle-plugin:$kotlinVersion")
  }
}

apply plugin: "com.facebook.react.rootproject"
apply plugin: 'kotlin'

allprojects {
  configurations.configureEach {
    resolutionStrategy.eachDependency { details ->
      if (details.requested.group == 'org.jetbrains.kotlinx' &&
        details.requested.name.startsWith('kotlinx-coroutines')) {
        details.useVersion '1.9.0'
        details.because 'Use Kotlin 2.0+ compatible coroutines version'
      }
    }
  }
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlinVersion"
}
