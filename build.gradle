buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '35')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '2.0.21'
        ndkVersion = "27.1.12297006"
    }

    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
        maven { url("node_modules/react-native/android") }
        maven { url("https://www.jitpack.io") }
    }

    dependencies {
        def agpVersion = findProperty('android.gradlePluginVersion') ?: '8.1.1'
        classpath("com.android.tools.build:gradle:$agpVersion")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("org.jetbrains.kotlin:compose-compiler-gradle-plugin:$kotlinVersion")
        classpath("com.facebook.react:react-native-gradle-plugin:0.71.0")
    }
}
