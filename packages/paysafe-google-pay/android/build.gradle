buildscript {
  ext.kotlinVersion = project.findProperty('PaysafeGooglePay_kotlinVersion') ?: "2.0.21"

  ext.getExtOrDefault = { name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['PaysafeGooglePay_' + name]
  }

  repositories {
    gradlePluginPortal()
    google()
    mavenCentral()
    maven { url("../../../node_modules/react-native/android") }
    maven { url("https://www.jitpack.io") }
  }

  dependencies {
    // AGP and Kotlin plugins are provided by root build.gradle or host app

    classpath("org.jacoco:org.jacoco.core:0.8.11")
    classpath("org.jlleitschuh.gradle:ktlint-gradle:11.3.2")
  }
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "org.jlleitschuh.gradle.ktlint"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def supportsNamespace() {
  def parsed = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')
  def major = parsed[0].toInteger()
  def minor = parsed[1].toInteger()
  return (major == 7 && minor >= 3) || major >= 8
}

android {
  if (supportsNamespace()) {
    namespace "com.paysafegooglepay"

    sourceSets {
      main {
        manifest.srcFile "src/main/AndroidManifest.xml"
      }
    }
  }

  compileSdk 35

  defaultConfig {
    minSdk 24
    targetSdk 34
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

afterEvaluate {
  if (tasks.findByName("generateCodegenArtifactsFromSchema") != null) {
    tasks.named("runKtlintCheckOverMainSourceSet").configure {
      dependsOn("generateCodegenArtifactsFromSchema")
    }
  }

  if (tasks.findByName("jacocoUnitTestReport") != null) {
    tasks.jacocoUnitTestReport.dependsOn processDebugManifest
    tasks.jacocoUnitTestReport.dependsOn compileDebugLibraryResources
  }
}

dependencies {
  implementation("com.github.paysafegroup.paysafe_sdk_android_payments_api:google-pay:0.0.44")

  implementation("com.facebook.react:react-android:+")
  implementation("org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion")
  testImplementation("junit:junit:4.13.2")
  testImplementation("org.mockito:mockito-core:5.10.0")
  testImplementation("org.mockito.kotlin:mockito-kotlin:5.2.1")
  testImplementation("io.mockk:mockk:1.13.14")
  testImplementation("androidx.test:core:1.6.1")
  testImplementation("org.robolectric:robolectric:4.14.1")
  testImplementation("androidx.test:runner:1.6.2")
  testImplementation("androidx.test.ext:junit:1.2.1")
  testImplementation("org.jetbrains.kotlinx:kotlinx-coroutines-test:1.9.0")
}
